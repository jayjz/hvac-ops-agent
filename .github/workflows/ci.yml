name: HVAC Ops CI (Phase 9 polished with cache, trufflehog, pytest-docker equivalent via mongo service)

on:
  push:
    branches: [ dev/ai-integration ]
  pull_request:
    branches: [ dev/ai-integration ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
    - name: Cache pip
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: ${{ runner.os }}-pip-
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-cov ruff mypy pydantic pymongo python-dotenv
        pip install trufflehog  # for local but CI uses action
    - name: Ruff lint
      run: ruff check . --fix --unsafe-fixes
    - name: Mypy type check
      run: mypy core tests --config-file mypy.ini
    - name: Test with Mongo fixture
      env:
        MONGO_URI: mongodb://localhost:27017/hvac_ops
      run: python -m pytest tests/ -q --cov=core --cov-report=term-missing
    - name: Trufflehog secret scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: .
        base: main
        head: HEAD
        extra_args: --only-verified
    - name: Credential grep fallback
      run: git ls-files | xargs grep -E '(MONGO_URI|password|API_KEY|secret|key)' || echo "CLEAN - No hard-coded credentials"
