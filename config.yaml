codeforge:
  version: "1.0.1-hackathon"

  # Model Configuration - Switched to Gemini compatible
  models:
    lead_architect: "gemini-2.5-pro"   # Use via Google Cloud Agent Builder
    specialists:
      inventory_forecaster: "gemini-2.5-flash"
      scheduler_optimizer: "gemini-2.5-pro"
      ar_collector: "gemini-2.5-flash"
      parts_orderer: "gemini-2.5-flash"
      risk_assessor: "gemini-2.5-pro"

  # HVAC / Trades Domain Configuration
  domain:
    industry: "HVAC and Small Trades Services"
    key_entities:
      - jobs
      - inventory
      - customers
      - technicians
      - invoices
    data_sources: ["MongoDB Atlas via MCP"]

  # Processing Limits
  limits:
    max_jobs_per_analysis: 50
    max_forecast_days: 30
    max_concurrent_tasks: 4
    timeout_per_task_minutes: 8

  # Security & Approval Settings
  security:
    create_backups: true
    require_approval_for:
      - parts_orders
      - schedule_changes
      - financial_actions

  # MongoDB MCP Integration
  mongodb_mcp:
    enabled: true
    collections:
      - jobs
      - inventory
      - customers
      - audit_logs

  # Agent Behavior
  agent_behavior:
    human_in_loop: true
    max_reasoning_steps: 8
    tool_execution_enabled: true
