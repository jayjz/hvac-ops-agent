version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: hvac_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: hvac_ops
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  hvac-api:
    build: .
    container_name: hvac_ops_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./temp_repos:/app/temp_repos
      - ./logs:/app/logs
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hvac_redis
    ports:
      - "6379:6379"
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hvac_nginx
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - hvac-api
    restart: always

volumes:
  mongo_data: